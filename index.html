<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Traverse Holdings</title>
  <meta name="description" content="Patient capital">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a1a;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    ::selection {
      background-color: #404040;
      color: #f5f5f4;
    }
    .traverse-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeInUp 1.8s ease-out forwards;
      animation-delay: .3s;
    }
    .traverse-line {
      width: 100px;
      height: 1px;
      background-color: #f5f5f4;
      margin-bottom: 24px;
      animation: lineFadeIn 2.1s ease-out, boxBreathe 16s ease-in-out 2.1s infinite;
    }
    .traverse-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .3em;
      color: #f5f5f4;
      text-transform: uppercase;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes boxBreathe {
      0%, 100% { opacity: 1; }
      25%, 50% { opacity: .35; }
      75% { opacity: 1; }
    }
    @media screen and (max-width: 480px) {
      .traverse-line { width: 70px; }
      .traverse-text { font-size: 10px; letter-spacing: .25em; }
    }
  </style>
</head>
<body>
  <div class="traverse-logo">
    <div class="traverse-line"></div>
    <div class="traverse-text">Traverse Holdings</div>
  </div>
</body>
</html>
